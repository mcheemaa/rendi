<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 220" role="img" aria-label="rendi">
  <!-- The Rendi wordmark, static. Renders identically in every consumer: browsers,
       img tags, previews, sanitizers. Stroke uses currentColor (defaults to black);
       set the host color, or theme the classes. The dot stays amber and can be
       themed via the rendi accent custom property. For the self-writing version,
       use rendi-wordmark-animated.svg. -->
