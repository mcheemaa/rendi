<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 120" role="img" aria-label="Rendi mark">
  <!-- The ri ligature, static: the wordmark's r flowing into its i, first letter
       to last, the amber dot as the i's tittle. Renders identically in every
       consumer. Stroke uses currentColor (defaults to black); set the host color.
       For the self-writing version, use rendi-mark-animated.svg. -->
  <style>
    .rendi-mark-dot { fill: var(--rendi-accent, #E8A33D); }
  </style>
  <path class="rendi-mark-stroke" fill="none" stroke="currentColor" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" d="M 8 104 C 22 92, 32 70, 38 46 C 40 34, 47 28, 53 32 C 59 37, 64 39, 72 37 C 77 36, 80 40, 79 46 C 76 60, 76 74, 80 88 C 82 96, 87 96, 90 90 C 94 79, 96 66, 98 54 C 99 63, 99 76, 102 88 C 105 97, 112 95, 118 88"/>
  <circle class="rendi-mark-dot" cx="100" cy="26" r="9" fill="#E8A33D"/>
</svg>
